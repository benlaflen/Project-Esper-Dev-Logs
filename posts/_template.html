<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>{{TITLE}} — Project: Esper Dev Log</title>
  <meta name="description" content="{{EXCERPT}}" />
  <link rel="stylesheet" href="../assets/css/style.css" />
</head>
<body>

  <header class="site-header">
    <div class="header-inner">
      <div class="logo-block">
        <span class="logo-eyebrow">developer journal</span>
        <h1 class="site-title"><a href="../index.html">Project: Esper</a></h1>
        <span class="logo-sub">a roguelike, prioritizing depth</span>
      </div>
      <nav class="site-nav">
        <a href="../index.html" class="nav-link">Log</a>
        <a href="../about.html" class="nav-link">About</a>
      </nav>
    </div>
  </header>

  <main class="main-content">
    <header class="article-header">
      <div class="article-eyebrow">
        <span>{{NUMBER}}</span>
        <time>{{DATE}}</time>
      </div>
      <h1 class="article-title">{{TITLE}}</h1>
      <div class="article-tags">
        {{TAGS}}
      </div>
    </header>

    <div class="article-body">
      {{BODY}}
    </div>

    <nav class="article-nav">
      <a href="../index.html" class="article-nav-link prev">All entries</a>
      {{NEXT_PREV}}
    </nav>
  </main>

  <footer class="site-footer">
    <div class="footer-inner">
      <span class="footer-copy">built in public</span>
      <div style="display:flex;gap:1.2rem;">
        <a href="https://x.com/Project_Esper" target="_blank" class="footer-social">Twitter/X</a>
      </div>
    </div>
  </footer>

</body>
</html>
